# Auto-generated by uf init. Customize as needed.
# This file is user-owned -- uf init will not
# overwrite it after initial creation.

sources:
  # Per-repo disk sources (fine-grained provenance)
  - id: disk-local
    type: disk
    name: unbound-force
    config:
      path: "."

  - id: disk-dewey
    type: disk
    name: dewey
    config:
      path: "../dewey"

  - id: disk-gaze
    type: disk
    name: gaze
    config:
      path: "../gaze"

  - id: disk-homebrew-tap
    type: disk
    name: homebrew-tap
    config:
      path: "../homebrew-tap"

  - id: disk-replicator
    type: disk
    name: replicator
    config:
      path: "../replicator"

  - id: disk-website
    type: disk
    name: website
    config:
      path: "../website"

  # Org-level files (design papers, plans)
  - id: disk-org
    type: disk
    name: org-workspace
    config:
      path: "../"
      recursive: false

  # GitHub API (issues, PRs, READMEs)
  - id: github-unbound-force
    type: github
    name: unbound-force org
    config:
      org: unbound-force
      repos:
        - unbound-force
        - dewey
        - gaze
        - homebrew-tap
        - replicator
        - website
    refresh_interval: daily

  # --- Web documentation sources (toolstack + ecosystem docs) ---

  # Tier 1: Core Toolstack
  - id: web-swarm
    type: web
    name: Swarm Plugin Docs
    config:
      urls:
        - "https://www.swarmtools.ai/docs"
      depth: 2
    refresh_interval: weekly

  - id: web-opencode
    type: web
    name: OpenCode Docs
    config:
      urls:
        - "https://opencode.ai/docs"
      depth: 2
    refresh_interval: weekly

  - id: web-cobra
    type: web
    name: Cobra CLI Framework
    config:
      urls:
        - "https://cobra.dev"
      depth: 1
    refresh_interval: weekly

  # Tier 2: Go Ecosystem
  - id: web-go-stdlib
    type: web
    name: Go Standard Library
    config:
      urls:
        - "https://pkg.go.dev/std"
      depth: 1
    refresh_interval: weekly

  - id: web-golangci-lint
    type: web
    name: golangci-lint Docs
    config:
      urls:
        - "https://golangci-lint.run"
      depth: 2
    refresh_interval: weekly

  - id: web-goreleaser
    type: web
    name: GoReleaser Docs
    config:
      urls:
        - "https://goreleaser.com/intro"
      depth: 2
    refresh_interval: weekly

  # Tier 3: Ecosystem Tools
  - id: web-openspec
    type: web
    name: OpenSpec CLI
    config:
      urls:
        - "https://github.com/fission-ai/openspec"
      depth: 1
    refresh_interval: weekly

  - id: web-charmbracelet-log
    type: web
    name: Charmbracelet Log
    config:
      urls:
        - "https://pkg.go.dev/github.com/charmbracelet/log"
      depth: 1
    refresh_interval: weekly

  - id: web-charmbracelet-lipgloss
    type: web
    name: Charmbracelet Lipgloss
    config:
      urls:
        - "https://pkg.go.dev/github.com/charmbracelet/lipgloss"
      depth: 1
    refresh_interval: weekly
